<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario del sitio web médico</title>
</head>
<body>
    <h1>Solicite una cita</h1>
    <h2>Complete el formulario para solicitar una cita médica</h2>
    <form action="procesarFormulario.html" method="post">

        <fieldset>
            <legend>Datos Personales</legend>

        <label for="nombre">Nombre:</label>
        <input type="text" name="nombre" id="nombre" placeholder="Ingrese su nombre">

        <br><br>

        <label for="apellido">Apellido:</label>
        <input type="text" name="apellido" id="apellido" placeholder="Ingrese su apellido">

        <br><br>

        <label for="fechaNac">Fecha de Nacimiento:</label>
        <input type="date" name="fechaNac" id="fechaNac">

        <br><br>

        <label for="dni">DNI:</label>
        <input type="number" name="dni" id="dni" placeholder="Ingrese su número de documento">
    
        <br><br>

        <label>Sexo:</label>
        <label for="masculino">Masculino</label>
        <input type="radio" name="genero" id="masculino">

        <label for="femenino">Femenino</label>
        <input type="radio" name="genero" id="femenino">
        </fieldset>

        <br>

        <fieldset>
            <legend>Datos de Contacto</legend>

            <label for="email">Correo Electrónico:</label>
            <input type="email" name="email" id="email" placeholder="usuario@email.com">

            <br><br>

            <label for="telefono">Número de Teléfono:</label>
            <input type="tel" name="telefono" id="telefono" placeholder="Ingrese su número de teléfono">
        </fieldset>

        <br>

        <fieldset>
            <legend>Mótivo de solicitud</legend>

            <label for="comentarios">Explique el motivo de su solicitud para una cita médica:</label><br>
            <textarea name="comentarios" id="comentarios" cols="30" rows="8" placeholder="ingrese aqui su comentario"></textarea>
            <br>
            <sup>lo que ingrese aquí es de carácter confidencial de paciente a medico</sup>
        </fieldset>
      
        <br><br>
        <input type="reset" value="Limpiar" />

        <input type="submit" value="Mandar" />
    </form>
</body>
</html>
